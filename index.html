<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="description" content="TrLaucher - Launcher Minecraft PE tốt nhất cho Android" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TrLaucher — Minecraft PE Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  </head>
  <body>
    <div id="app">
      <div id="splash-screen">
        <div class="splash-logo">
          <div class="splash-icon" style="margin-bottom: 16px; display: flex; justify-content: center;">
            <svg width="48" height="48" viewBox="0 0 32 32" fill="none" style="filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.6));">
              <path d="M16 4L26 9L16 14L6 9L16 4Z" fill="url(#cube-top-sp)" opacity="0.95"/>
              <path d="M6 9L16 14V25L6 20V9Z" fill="url(#cube-left-sp)" opacity="0.9"/>
              <path d="M16 14L26 9V20L16 25V14Z" fill="url(#cube-right-sp)" opacity="0.9"/>
              <path d="M16 10L20 12L16 14L12 12L16 10Z" fill="#FFF" opacity="0.3"/>
              <defs>
                <linearGradient id="cube-top-sp" x1="6" y1="9" x2="26" y2="9" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#34D399" />
                  <stop offset="100%" stop-color="#059669" />
                </linearGradient>
                <linearGradient id="cube-left-sp" x1="6" y1="9" x2="16" y2="25" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#059669" />
                  <stop offset="100%" stop-color="#047857" />
                </linearGradient>
                <linearGradient id="cube-right-sp" x1="16" y1="14" x2="26" y2="20" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#10B981" />
                  <stop offset="100%" stop-color="#064E3B" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="splash-title">TrLaucher</div>
          <div class="splash-bar"><div class="splash-fill"></div></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
